[global]
  priority = "low"
  ionice = true

["mycompany-backup"]
  repository    = "s3:s3.amazonaws.com/mycompany-backup"
  password-file = "/etc/restic/password"
  initialize    = true

  # AWS credentials are read from environment variables via Go template syntax.
  # Set AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in the environment before
  # running resticprofile (e.g. in /etc/resticprofile/environment or via
  # systemd EnvironmentFile).
  ["mycompany-backup".env]
    AWS_ACCESS_KEY_ID     = "{{ .Env.AWS_ACCESS_KEY_ID }}"
    AWS_SECRET_ACCESS_KEY = "{{ .Env.AWS_SECRET_ACCESS_KEY }}"

  ["mycompany-backup".backup]
    source  = ["/var/www", "/etc"]
    schedule            = "Sun *-*-* 03:00:00"
    schedule-permission = "system"
    schedule-lock-wait  = "30m"
    # healthchecks.io hooks — replace <YOUR-UUID> with your actual check UUID
    run-before     = ["curl -fsS -m 10 --retry 3 'https://hc-ping.com/<YOUR-UUID>/start'"]
    run-after      = ["curl -fsS -m 10 --retry 3 'https://hc-ping.com/<YOUR-UUID>'"]
    run-after-fail = ["curl -fsS -m 10 --retry 3 'https://hc-ping.com/<YOUR-UUID>/fail'"]

  ["mycompany-backup".retention]
    keep-weekly  = 8
    keep-monthly = 12
    keep-yearly  = 3
    after-backup = true

  ["mycompany-backup".check]
    schedule            = "monthly"
    schedule-permission = "system"
